<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    body { font-family: sans-serif; background:#eef3fb; margin:0; min-height:100vh; display:grid; place-items:center; }
    .card { width:min(480px,94%); background:#fff; border:1px solid #d7e2f0; border-radius:14px; padding:18px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    h1 { margin:0; font-size:24px; color:#254563; }
    .muted { color:#64809a; font-size:14px; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0; }
    .tile { border:1px solid #d7e2f0; border-radius:10px; padding:10px; font-size:13px; color:#42617f; background:#f8fbff; }
    button { border:0; border-radius:8px; padding:10px 14px; background:#2f80df; color:#fff; font-weight:700; cursor:pointer; }
    .logout { background:#edf3ff; color:#28507e; }
    .status { margin-top:10px; font-size:13px; color:#5c7692; min-height:18px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <h1>AI Study Hub</h1>
      <button id="logoutBtn" class="logout">Logout</button>
    </div>
    <div id="welcome" class="muted"></div>
    <div class="muted">System will find partner by your saved interests. If no partner exists, solo AI chat opens automatically.</div>

    <div class="grid">
      <div class="tile"><b>1. Match</b><br/>Interest-based partner matching</div>
      <div class="tile"><b>2. Learn</b><br/>Use commands: #topic, #task, #answer</div>
      <div class="tile"><b>3. Improve</b><br/>AI gives scored feedback and next steps</div>
    </div>

    <button id="startBtn">Start Session</button>
    <div id="status" class="status"></div>
  </main>

  <script>
    const token = localStorage.getItem("access");
    if (!token) window.location.href = "/login/";

    const username = localStorage.getItem("username") || "User";
    document.getElementById("welcome").textContent = `Welcome, ${username}`;

    async function api(path, method = "GET", body = null) {
      const res = await fetch(path, {
        method,
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: body ? JSON.stringify(body) : null,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.error || JSON.stringify(data));
      return data;
    }

    function setStatus(t) { document.getElementById("status").textContent = t; }

    document.getElementById("startBtn").onclick = async () => {
      try {
        const match = await api("/matching/find/");
        const payload = {};
        if (!match.is_solo && match.matched_user_id) payload.matched_user_id = match.matched_user_id;
        const chat = await api("/chat/sessions/", "POST", payload);

        localStorage.setItem("chat_id", chat.id);
        localStorage.setItem("is_solo", String(chat.is_solo));

        setStatus(match.is_solo ? "No partner found. Solo mode started." : `Matched with ${match.username}.`);
        window.location.href = "/app/chat/";
      } catch (e) {
        setStatus(e.message);
      }
    };

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("access");
      localStorage.removeItem("username");
      localStorage.removeItem("chat_id");
      localStorage.removeItem("is_solo");
      localStorage.removeItem("topic");
      document.cookie = "access_token=; path=/; max-age=0; samesite=lax";
      window.location.href = "/login/";
    };
  </script>
</body>
</html>
