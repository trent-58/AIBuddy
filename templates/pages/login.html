<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body { font-family: sans-serif; background:#eef3fb; margin:0; min-height:100vh; display:grid; place-items:center; }
    .card { width:min(360px,92%); background:#fff; border:1px solid #d7e2f0; border-radius:12px; padding:18px; }
    h1 { margin:0 0 12px; font-size:22px; color:#254563; }
    input { width:100%; padding:10px; margin:6px 0; border:1px solid #cad9ea; border-radius:8px; }
    button { width:100%; padding:10px; border:0; border-radius:8px; background:#2f80df; color:#fff; font-weight:700; cursor:pointer; }
    .row { margin-top:10px; font-size:13px; color:#5b7592; }
    .err { color:#c0392b; font-size:13px; min-height:18px; margin-top:8px; }
    a { color:#2f80df; text-decoration:none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login</h1>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
    <div id="err" class="err"></div>
    <div class="row">No account? <a href="/signup/">Create one</a></div>
  </main>

  <script>
    async function api(path, method, body) {
      const res = await fetch(path, {
        method,
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.error || JSON.stringify(data));
      return data;
    }

    document.getElementById("loginBtn").onclick = async () => {
      const err = document.getElementById("err");
      err.textContent = "";
      try {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const data = await api("/user/login/", "POST", { username, password });
        localStorage.setItem("access", data.access);
        localStorage.setItem("username", username);
        document.cookie = `access_token=${data.access}; path=/; max-age=86400; samesite=lax`;
        window.location.href = "/";
      } catch (e) {
        err.textContent = e.message;
      }
    };
  </script>
</body>
</html>
